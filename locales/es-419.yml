usage:
  header: "Pogoda - Pronóstico del tiempo  v%{version}"
  usage_title: "Uso:"
  usage_lat_lng: "pogoda <latitud> <longitud> [días]"
  usage_latlng: "pogoda <lat,lng> [días]"
  usage_city: "pogoda <ciudad> [días]"
  days_desc: "días  Pronóstico de 1–16 días (predeterminado: 7); con N-M se muestran del día N al M"
  modifiers_title: "Modificadores:"
  flag_drone: "--i-drone-you        Perfil piloto de dron: viento a varias altitudes, lluvia, UV"
  flag_delorean: "--delorean D1 D2     Datos históricos de D1 a D2 (DD.MM.AAAA); modo automático"
  flag_units: "--units <X>          Sistema de unidades: metric|imperial|british (auto del locale)"
  flag_lang: "--lang <XX>          Idioma: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Paleta fría: cian → azul → índigo"
  flag_color_me: "--color-me           Paleta completa: cian → azul → índigo → rojo → naranja"
  flag_classic: "--classic-colors     Paleta clásica: azul → cian → verde → amarillo → naranja → rojo"
  flag_rainforest: "--rainforest         Paleta natural: cian → verde → lima"
  flag_mono: "--i-cant-afford-cga  Salida monocromática (sin colores)"
  flag_high_charts: "--high-charts        Gráficos más altos (24 filas)"
  flag_no_charts: "--no-charts          Omitir gráficos de resumen"
  flag_no_table: "--no-table           Omitir tabla horaria"
  flag_tabular: "--tabular-bells      Exportar CSV en lugar de gráficos/tabla"
  flag_no_eyecandy: "--no-eyecandy        Omitir logo, encabezado y pie de página"
  default_palette: "(Paleta predeterminada: índigo → rojo → naranja)"
  examples_title: "Ejemplos:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Ciudad de México"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Ciudad de México 3-7    (días 3 a 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Ciudad de México 3 --lang es-419"
