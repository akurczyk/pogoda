usage:
  header: "Pogoda - Прогноз Погоды в Терминале  v%{version}"
  usage_title: "Использование:"
  usage_lat_lng: "pogoda <широта> <долгота> [дни]"
  usage_latlng: "pogoda <шир,долг> [дни]"
  usage_city: "pogoda <город> [дни]"
  days_desc: "дни  Дней прогноза 1–16 (по умолчанию: 7); диапазон N-M показывает дни N до M"
  modifiers_title: "Параметры:"
  flag_drone: "--i-drone-you        Профиль пилота дрона: ветер на нескольких высотах, дождь, УФ"
  flag_delorean: "--delorean D1 D2     Исторические данные от D1 до D2 (ДД.ММ.ГГГГ); авто-режим"
  flag_units: "--units <X>          Система единиц: metric|imperial|british (авто из locale)"
  flag_lang: "--lang <XX>          Язык: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (авто)"
  flag_blue: "--i-am-blue          Холодная палитра: циан → синий → индиго"
  flag_color_me: "--color-me           Полная палитра: циан → синий → индиго → красный → оранжевый"
  flag_classic: "--classic-colors     Классическая: синий → циан → зелёный → жёлтый → оранж → красный"
  flag_rainforest: "--rainforest         Природная палитра: циан → зелёный → лайм"
  flag_mono: "--i-cant-afford-cga  Монохромный вывод (без цветов)"
  flag_high_charts: "--high-charts        Высокие графики (24 строки)"
  flag_no_charts: "--no-charts          Пропустить обзорные графики"
  flag_no_table: "--no-table           Пропустить почасовую таблицу"
  flag_tabular: "--tabular-bells      Вывод CSV вместо графиков/таблицы"
  flag_no_eyecandy: "--no-eyecandy        Пропустить логотип, заголовок и нижний колонтитул"
  default_palette: "(Палитра по умолчанию: индиго → красный → оранжевый)"
  examples_title: "Примеры:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Wrocław"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Wrocław 3-7              (дни 3 до 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Wrocław 3 --lang ru"
