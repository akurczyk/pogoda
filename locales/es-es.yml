usage:
  header: "Pogoda - Pronóstico meteorológico  v%{version}"
  usage_title: "Uso:"
  usage_lat_lng: "pogoda <latitud> <longitud> [días]"
  usage_latlng: "pogoda <lat,lng> [días]"
  usage_city: "pogoda <ciudad> [días]"
  days_desc: "días  Pronóstico 1–16 días (por defecto: 7); con N-M solo días de N a M"
  modifiers_title: "Modificadores:"
  flag_drone: "--i-drone-you        Perfil de dron: viento a distintas alturas, lluvia, UV"
  flag_delorean: "--delorean D1 D2     Históricos de D1 a D2 (DD.MM.AAAA); selección de modo automática"
  flag_units: "--units <X>          Sistema: metric|imperial|british (por defecto: según locale del SO)"
  flag_lang: "--lang <XX>          Idioma: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Paleta fría: cian → azul → añil"
  flag_color_me: "--color-me           Paleta completa: cian → azul → añil → rojo → naranja"
  flag_classic: "--classic-colors     Clásica: azul → cian → verde → amarillo → naranja → rojo"
  flag_rainforest: "--rainforest         Naturaleza: cian → verde → lima"
  flag_mono: "--i-cant-afford-cga  Salida monocroma (sin color)"
  flag_high_charts: "--high-charts        Gráficos más altos (24 filas)"
  flag_no_charts: "--no-charts          Sin gráficos de resumen"
  flag_no_table: "--no-table           Sin tabla horaria"
  flag_tabular: "--tabular-bells      Salida en CSV en lugar de gráficos y tabla"
  flag_no_eyecandy: "--no-eyecandy        Sin logotipo, cabecera ni pie de página"
  default_palette: "(Predeterminado: añil → rojo → naranja)"
  examples_title: "Ejemplos:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Madrid"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Madrid 3-7            (días 3 a 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Madrid 3 --lang es-es"
