usage:
  header: "Pogoda - Прогноз Погоди в Терміналі  v%{version}"
  usage_title: "Використання:"
  usage_lat_lng: "pogoda <широта> <довгота> [дні]"
  usage_latlng: "pogoda <шир,довг> [дні]"
  usage_city: "pogoda <місто> [дні]"
  days_desc: "дні  Днів прогнозу 1–16 (за замовчуванням: 7); діапазон N-M показує дні N до M"
  modifiers_title: "Параметри:"
  flag_drone: "--i-drone-you        Профіль пілота дрона: вітер на різних висотах, дощ, УФ"
  flag_delorean: "--delorean D1 D2     Історичні дані від D1 до D2 (ДД.ММ.РРРР); авто-режим"
  flag_units: "--units <X>          Система одиниць: metric|imperial|british (авто з locale)"
  flag_lang: "--lang <XX>          Мова: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (авто)"
  flag_blue: "--i-am-blue          Холодна палітра: ціан → синій → індиго"
  flag_color_me: "--color-me           Повна палітра: ціан → синій → індиго → червоний → помаранч"
  flag_classic: "--classic-colors     Класична: синій → ціан → зелений → жовтий → помаранч → червоний"
  flag_rainforest: "--rainforest         Природна палітра: ціан → зелений → лайм"
  flag_mono: "--i-cant-afford-cga  Монохромний вивід (без кольорів)"
  flag_high_charts: "--high-charts        Високі графіки (24 рядки)"
  flag_no_charts: "--no-charts          Пропустити огляд графіків"
  flag_no_table: "--no-table           Пропустити погодинну таблицю"
  flag_tabular: "--tabular-bells      Вивід CSV замість графіків/таблиці"
  flag_no_eyecandy: "--no-eyecandy        Пропустити логотип, заголовок і підвал"
  default_palette: "(Палітра за замовчуванням: індиго → червоний → помаранч)"
  examples_title: "Приклади:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Wrocław"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Wrocław 3-7              (дні 3 до 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Wrocław 3 --lang uk"
