  flag_no_table: "--no-table           Χωρίς πίνακα ωρών"
  flag_tabular: "--tabular-bells      Έξοδος CSV"
  flag_no_eyecandy: "--no-eyecandy        Χωρίς λογότυπο/υποσέλιδο"
  default_palette: "(Προεπ.: indigo → κόκκινο → πορτοκαλί)"
