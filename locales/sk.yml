  flag_lang: "--lang <XX>          Jazyk: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Chlad: cyan → modrá → indigo"
  flag_color_me: "--color-me           Plná: cyan → modrá → indigo → červená → oranžová"
  flag_classic: "--classic-colors     Klasická paleta: modrá → cyan → zelená → žltá → oranžová"
  flag_rainforest: "--rainforest         Príroda: cyan → zelená → limetková"
  flag_mono: "--i-cant-afford-cga  Bez farieb"
  flag_high_charts: "--high-charts        Vyššie grafy (24 riadkov)"
  flag_no_charts: "--no-charts          Bez prehľadových grafov"
  flag_no_table: "--no-table           Bez hodinovej tabuľky"
  flag_tabular: "--tabular-bells      CSV namiesto grafov"
  flag_no_eyecandy: "--no-eyecandy        Bez loga, hlavičky a pätiek"
  default_palette: "(Predvolené: indigo → červená → oranžová)"
  examples_title: "Príklady:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Bratislava"
