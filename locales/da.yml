  flag_color_me: "--color-me           Cyan → blå → indigo → rød → orange"
  flag_classic: "--classic-colors     Klassisk: blå → cyan → grøn → gul"
  flag_rainforest: "--rainforest         Natur: cyan → grøn → lime"
  flag_mono: "--i-cant-afford-cga  Monokrom"
  flag_high_charts: "--high-charts        Højere diagrammer (24 linjer)"
  flag_no_charts: "--no-charts          Uden oversigtsgrafer"
  flag_no_table: "--no-table           Uden timevis tabel"
  flag_tabular: "--tabular-bells      CSV i stedet for grafer"
  flag_no_eyecandy: "--no-eyecandy        Uden logo, top og bundtekst"
  default_palette: "(Standard: indigo → rød → orange)"
  examples_title: "Eksempler:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda København"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda København 3-7         (dage 3–7)"
