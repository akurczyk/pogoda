  flag_units: "--units <X>          Enheder: metric|imperial|british (auto)"
  flag_lang: "--lang <XX>          Sprog: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
