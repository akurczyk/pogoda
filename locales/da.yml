usage:
  header: "Pogoda - Vejr i terminalen  v%{version}"
  usage_title: "Brug:"
  usage_lat_lng: "pogoda <bredde> <længde> [dage]"
  usage_latlng: "pogoda <br,læ> [dage]"
  usage_city: "pogoda <by> [dage]"
