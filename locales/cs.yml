usage:
  header: "Pogoda - Předpověď počasí v terminálu  v%{version}"
  usage_title: "Použití:"
  usage_lat_lng: "pogoda <zem. šířka> <zem. délka> [dny]"
  usage_latlng: "pogoda <šířka,délka> [dny]"
  usage_city: "pogoda <město> [dny]"
  days_desc: "dny  Předpověď na 1–16 dní (výchozí: 7); N–M zobrazí jen dny N až M"
  modifiers_title: "Přepínače:"
  flag_drone: "--i-drone-you        Dron: vítr ve výškách, déšť, UV"
  flag_delorean: "--delorean D1 D2     Historie D1 až D2 (DD.MM.RRRR); auto režim"
  flag_units: "--units <X>          Jednotky: metric|imperial|british (výchozí: auto)"
  flag_lang: "--lang <XX>          Jazyk: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (výchozí: auto)"
  flag_blue: "--i-am-blue          Chladné barvy: cyan → modrá → indigo"
  flag_color_me: "--color-me           Plná škála: cyan → modrá → indigo → červená → oranžová"
  flag_classic: "--classic-colors     Klasická: modrá → cyan → zelená → žlutá → oranžová → červená"
  flag_rainforest: "--rainforest         Příroda: cyan → zelená → limetková"
  flag_mono: "--i-cant-afford-cga  Bez barev (monochrom)"
  flag_high_charts: "--high-charts        Vyšší grafy (24 řádků)"
  flag_no_charts: "--no-charts          Bez přehledových grafů"
  flag_no_table: "--no-table           Bez hodinové tabulky"
  flag_tabular: "--tabular-bells      Výstup CSV místo grafů"
  flag_no_eyecandy: "--no-eyecandy        Bez loga, hlavičky a patičky"
  default_palette: "(Výchozí: indigo → červená → oranžová)"
  examples_title: "Příklady:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Praha"
  ex4: "pogoda Berlín 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Praha 3-7            (dny 3 až 7)"
