usage:
  header: "Pogoda - Vremea în terminal  v%{version}"
  usage_title: "Utilizare:"
  usage_lat_lng: "pogoda <latitudine> <longitudine> [zile]"
  usage_latlng: "pogoda <lat,lng> [zile]"
  usage_city: "pogoda <oraș> [zile]"
  days_desc: "zile  1–16 zile prognoză (implicit: 7); N–M arată doar zilele N–M"
  modifiers_title: "Opțiuni:"
  flag_drone: "--i-drone-you        Drona: vânt pe înălțimi, ploaie, UV"
  flag_delorean: "--delorean D1 D2     Istoric de la D1 la D2 (ZZ.LL.AAAA); mod automat"
  flag_units: "--units <X>          Unități: metric|imperial|british (implicit: auto SO)"
  flag_lang: "--lang <XX>          Limbă: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (implicit: auto)"
  flag_blue: "--i-am-blue          Rece: cyan → albastru → indigo"
  flag_color_me: "--color-me           P:cyan → albastru → indigo → roșu → portocaliu"
  flag_classic: "--classic-colors     Clasic: albastru → cyan → verde → galben → portocaliu"
  flag_rainforest: "--rainforest         Natură: cyan → verde → lime"
  flag_mono: "--i-cant-afford-cga  Fără culori"
  flag_high_charts: "--high-charts        Grafice mai înalte (24 rânduri)"
  flag_no_charts: "--no-charts          Fără grafice sumar"
  flag_no_table: "--no-table           Fără tabel orar"
  flag_tabular: "--tabular-bells      CSV în loc de grafice/tabel"
  flag_no_eyecandy: "--no-eyecandy        Fără logo, antet, subsol"
  default_palette: "(Implicit: indigo → roșu → portocaliu)"
  examples_title: "Exemple:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda București"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda București 3-7         (zile 3–7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda București 3 --lang ro"
