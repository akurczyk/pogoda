usage:
  header: "Pogoda - Previsão do tempo no terminal  v%{version}"
  usage_title: "Uso:"
  usage_lat_lng: "pogoda <latitude> <longitude> [dias]"
  usage_latlng: "pogoda <lat,lng> [dias]"
  usage_city: "pogoda <cidade> [dias]"
  days_desc: "dias  Previsão de 1–16 dias (padrão: 7); N–M mostra só os dias de N a M"
  modifiers_title: "Opções:"
  flag_drone: "--i-drone-you        Drone: vento a várias altitudes, chuva, UV"
  flag_delorean: "--delorean D1 D2     Histórico de D1 a D2 (DD.MM.AAAA); modo automático"
  flag_units: "--units <X>          Unidades: metric|imperial|british (padrão: auto do SO)"
  flag_lang: "--lang <XX>          Idioma: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (padrão: auto)"
  flag_blue: "--i-am-blue          Tema frio: ciano → azul → anil"
  flag_color_me: "--color-me           Tema: ciano → azul → anil → vermelho → laranja"
  flag_classic: "--classic-colors     Clássico: azul → ciano → verde → amarelo → laranja → vermelho"
  flag_rainforest: "--rainforest         Natureza: ciano → verde → lima"
  flag_mono: "--i-cant-afford-cga  Sem cores (monocromático)"
  flag_high_charts: "--high-charts        Gráficos mais altos (24 linhas)"
  flag_no_charts: "--no-charts          Sem gráficos de visão geral"
  flag_no_table: "--no-table           Sem tabela horária"
  flag_tabular: "--tabular-bells      Saída CSV em vez de gráficos/tabela"
  flag_no_eyecandy: "--no-eyecandy        Sem logótipo, cabeçalho e rodapé"
  default_palette: "(Padrão: anil → vermelho → laranja)"
  examples_title: "Exemplos:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda São Paulo"
  ex4: "pogoda Berlim 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda Nova Iorque 7 --i-am-blue"
  ex7: "pogoda São Paulo 3-7         (dias 3 a 7)"
  ex8: "pogoda Berlim 5-10 --i-drone-you"
  ex9: "pogoda São Paulo 3 --lang pt-br"
