  flag_color_me: "--color-me           syaani → sininen → indigo → punainen → oranssi"
  flag_classic: "--classic-colors     Klassinen: sininen → syaani → vihreä"
  flag_rainforest: "--rainforest         Luonto: syaani → vihreä → limetti"
  flag_mono: "--i-cant-afford-cga  Mustavalkoinen"
  flag_high_charts: "--high-charts        Korkeammat kuvaajat (24 riviä)"
  flag_no_charts: "--no-charts          Ei yhteenvetokäyriä"
  flag_no_table: "--no-table           Ei tuntitaulukkoa"
  flag_tabular: "--tabular-bells      CSV-tuloste"
  flag_no_eyecandy: "--no-eyecandy        Ei logoa, otsikkoa, alatunnistetta"
  default_palette: "(Oletus: indigo → punainen → oranssi)"
  examples_title: "Esimerkit:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Helsinki"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
