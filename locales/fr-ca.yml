usage:
  header: "Pogoda - Météo au terminal  v%{version}"
  usage_title: "Utilisation :"
  usage_lat_lng: "pogoda <latitude> <longitude> [jours]"
  usage_latlng: "pogoda <lat,lng> [jours]"
  usage_city: "pogoda <ville> [jours]"
  days_desc: "jours  Prévision sur 1–16 jours (par défaut : 7) ; N–M affiche seulement les jours N à M"
  modifiers_title: "Paramètres :"
  flag_drone: "--i-drone-you        Drone : vent à plusieurs hauteurs, pluie, UV"
  flag_delorean: "--delorean D1 D2     Historique de D1 à D2 (JJ.MM.AAAA) ; mode automatique"
  flag_units: "--units <X>          Unités : metric|imperial|british (par défaut : auto selon l'OS)"
  flag_lang: "--lang <XX>          Langue d'affichage : en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Tons froids : cyan → bleu → indigo"
  flag_color_me: "--color-me           Palette : cyan → bleu → indigo → rouge → orange"
  flag_classic: "--classic-colors     Classique : bleu → cyan → vert → jaune → orange → rouge"
  flag_rainforest: "--rainforest         Nature : cyan → vert → citron"
  flag_mono: "--i-cant-afford-cga  Texte seulement (monochrome)"
  flag_high_charts: "--high-charts        Graphiques plus hauts (24 lignes)"
  flag_no_charts: "--no-charts          Aucun graphique sommaire"
  flag_no_table: "--no-table           Aucun tableau des heures"
  flag_tabular: "--tabular-bells      Fichier CSV plutôt que graphiques et tableau"
  flag_no_eyecandy: "--no-eyecandy        Sans logo, en-tête ni bas de page"
  default_palette: "(Par défaut : indigo → rouge → orange)"
  examples_title: "Exemples :"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Montréal"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Montréal 3-7         (jours 3 à 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Montréal 3 --lang fr-ca"
