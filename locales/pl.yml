usage:
  header: "Pogoda - Prognoza Pogody w Terminalu  v%{version}"
  usage_title: "Użycie:"
  usage_lat_lng: "pogoda <szerokość> <długość> [dni]"
  usage_latlng: "pogoda <szer,dług> [dni]"
  usage_city: "pogoda <miasto> [dni]"
  days_desc: "dni  Liczba dni prognozy 1–16 (domyślnie: 7); zakres N-M pokazuje tylko dni N do M"
  modifiers_title: "Opcje:"
  flag_drone: "--i-drone-you        Profil pilota drona: wiatr na różnych wysokościach, deszcz, UV"
  flag_delorean: "--delorean D1 D2     Dane historyczne od D1 do D2 (DD.MM.RRRR); auto-wybór trybu"
  flag_units: "--units <X>          Wymusz system jednostek: metric|imperial|british (auto z locale)"
  flag_lang: "--lang <XX>          Język: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Chłodna paleta: cyjan → niebieski → indygo"
  flag_color_me: "--color-me           Pełna paleta: cyjan → niebieski → indygo → czerwony → pomarańcz"
  flag_classic: "--classic-colors     Klasyczna paleta: niebieski → cyjan → zielony → żółty → pomarańcz → czerwony"
  flag_rainforest: "--rainforest         Paleta natury: cyjan → zielony → limonka"
  flag_mono: "--i-cant-afford-cga  Monochromatyczny output (bez kolorów)"
  flag_high_charts: "--high-charts        Wyższe wykresy (24 wiersze)"
  flag_no_charts: "--no-charts          Pomiń przegląd wykresów"
  flag_no_table: "--no-table           Pomiń tabelę godzinową"
  flag_tabular: "--tabular-bells      Eksport CSV zamiast wykresów/tabeli"
  flag_no_eyecandy: "--no-eyecandy        Pomiń logo, nagłówek lokalizacji i stopkę"
  default_palette: "(Domyślna paleta: indygo → czerwony → pomarańcz)"
  examples_title: "Przykłady:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Wrocław"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda Nowy Jork 7 --i-am-blue"
  ex7: "pogoda Wrocław 3-7              (dni 3 do 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Wrocław 3 --lang pl"
