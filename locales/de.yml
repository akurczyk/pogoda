usage:
  header: "Pogoda - Wetterbericht im Terminal  v%{version}"
  usage_title: "Verwendung:"
  usage_lat_lng: "pogoda <Breitengrad> <Längengrad> [Tage]"
  usage_latlng: "pogoda <Breit,Läng> [Tage]"
  usage_city: "pogoda <Stadt> [Tage]"
  days_desc: "Tage  Vorhersagetage 1–16 (Standard: 7); Bereich N-M zeigt nur Tage N bis M"
  modifiers_title: "Optionen:"
  flag_drone: "--i-drone-you        Drohnenpilot-Profil: Wind auf mehreren Höhen, Regen, UV"
  flag_delorean: "--delorean D1 D2     Historische Daten von D1 bis D2 (TT.MM.JJJJ); Auto-Modus"
  flag_units: "--units <X>          Einheitensystem: metric|imperial|british (auto aus Locale)"
  flag_lang: "--lang <XX>          Sprache: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Kühle Palette: Cyan → Blau → Indigo"
  flag_color_me: "--color-me           Volle Palette: Cyan → Blau → Indigo → Rot → Orange"
  flag_classic: "--classic-colors     Klassische Palette: Blau → Cyan → Grün → Gelb → Orange → Rot"
  flag_rainforest: "--rainforest         Natur-Palette: Cyan → Grün → Limette"
  flag_mono: "--i-cant-afford-cga  Monochrome Ausgabe (keine Farben)"
  flag_high_charts: "--high-charts        Höhere Diagramme (24 Zeilen)"
  flag_no_charts: "--no-charts          Übersichtsdiagramme überspringen"
  flag_no_table: "--no-table           Stundentabelle überspringen"
  flag_tabular: "--tabular-bells      CSV-Ausgabe statt Diagrammen/Tabelle"
  flag_no_eyecandy: "--no-eyecandy        Logo, Kopfzeile und Fußzeile überspringen"
  default_palette: "(Standardpalette: Indigo → Rot → Orange)"
  examples_title: "Beispiele:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Wrocław"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Wrocław 3-7              (Tage 3 bis 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Wrocław 3 --lang de"
