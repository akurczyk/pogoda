usage:
  header: "Pogoda - Previsioni meteo da terminale  v%{version}"
  usage_title: "Utilizzo:"
  usage_lat_lng: "pogoda <latitudine> <longitudine> [giorni]"
  usage_latlng: "pogoda <lat,lng> [giorni]"
  usage_city: "pogoda <città> [giorni]"
  days_desc: "giorni  Previsione 1–16 giorni (default: 7); N–M mostra solo i giorni N–M"
  modifiers_title: "Opzioni:"
  flag_drone: "--i-drone-you        Profilo droni: vento a più quote, pioggia, UV"
  flag_delorean: "--delorean D1 D2     Storici da D1 a D2 (GG.MM.AAAA); scelta auto modalità"
  flag_units: "--units <X>          Unità: metric|imperial|british (default: auto dal sistema)"
  flag_lang: "--lang <XX>          Lingua UI: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (default: auto)"
  flag_blue: "--i-am-blue          Tema freddo: ciano → blu → indaco"
  flag_color_me: "--color-me           Tema: ciano → blu → indaco → rosso → arancione"
  flag_classic: "--classic-colors     Classico: blu → ciano → verde → giallo → arancio → rosso"
  flag_rainforest: "--rainforest         Natura: ciano → verde → lime"
  flag_mono: "--i-cant-afford-cga  Uscita in bianco e nero"
  flag_high_charts: "--high-charts        Grafici alti (24 righe)"
  flag_no_charts: "--no-charts          Salta grafici riepilogo"
  flag_no_table: "--no-table           Salta tabella oraria"
  flag_tabular: "--tabular-bells      Esci in CSV invece di grafici/tabella"
  flag_no_eyecandy: "--no-eyecandy        Senza logo, header e piè di pagina"
  default_palette: "(Tema predefinito: indaco → rosso → arancione)"
  examples_title: "Esempi:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Roma"
  ex4: "pogoda Berlino 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Roma 3-7              (giorni 3–7)"
  ex8: "pogoda Berlino 5-10 --i-drone-you"
  ex9: "pogoda Roma 3 --lang it"
