  flag_drone: "--i-drone-you        Drone: wind op hoogtes, regen, UV"
  flag_delorean: "--delorean D1 D2     Historie van D1 t/m D2 (DD.MM.JJJJ); auto-modus"
  flag_units: "--units <X>          Eenheden: metric|imperial|british (standaard: auto)"
  flag_lang: "--lang <XX>          Taal: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (standaard: auto)"
  flag_blue: "--i-am-blue          Koel: cyaan → blauw → indigo"
  flag_color_me: "--color-me           Vol: cyaan → blauw → indigo → rood → oranje"
  flag_classic: "--classic-colors     Klassiek: blauw → cyaan → geel → oranje → rood"
  flag_rainforest: "--rainforest         Natuur: cyaan → groen → limoen"
  flag_mono: "--i-cant-afford-cga  Monochroom (geen kleuren)"
  flag_high_charts: "--high-charts        Hogere grafieken (24 rijen)"
  flag_no_charts: "--no-charts          Geen overzichtsgrafieken"
  flag_no_table: "--no-table           Geen uurtabel"
  flag_tabular: "--tabular-bells      CSV in plaats van grafieken/tabel"
  flag_no_eyecandy: "--no-eyecandy        Zonder logo, kop- en voettekst"
  default_palette: "(Standaard: indigo → rood → oranje)"
  examples_title: "Voorbeelden:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Amsterdam"
  ex4: "pogoda Berlijn 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Amsterdam 3-7         (dagen 3 t/m 7)"
