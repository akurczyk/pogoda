usage:
  header: "Pogoda - Weerbericht in de terminal  v%{version}"
  usage_title: "Gebruik:"
  usage_lat_lng: "pogoda <breedtegraad> <lengtegraad> [dagen]"
  usage_latlng: "pogoda <breed,leng> [dagen]"
  usage_city: "pogoda <stad> [dagen]"
  days_desc: "dagen  Prognose 1–16 dagen (standaard: 7); N–M toont alleen dagen N t/m M"
