usage:
  header: "Pogoda - Vær i terminalen  v%{version}"
  usage_title: "Bruk:"
  usage_lat_lng: "pogoda <breddegrad> <lengdegrad> [dager]"
  usage_latlng: "pogoda <br,lng> [dager]"
  usage_city: "pogoda <by> [dager]"
  days_desc: "dager  1–16 dager (standard: 7); N–M viser bare dag N–M"
  modifiers_title: "Valg:"
  flag_drone: "--i-drone-you        Drone: vind i flere høyder, regn, UV"
  flag_delorean: "--delorean D1 D2     Historikk D1–D2 (DD.MM.YYYY); auto"
  flag_units: "--units <X>          Enheter: metric|imperial|british (auto)"
  flag_lang: "--lang <XX>          Språk: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Kjølig: cyan → blå → indigo"
  flag_color_me: "--color-me           Cyan → blå → indigo → rød → oransje"
  flag_classic: "--classic-colors     Klassisk: blå → cyan → grønn → gul"
  flag_rainforest: "--rainforest         Natur: cyan → grønn → lime"
  flag_mono: "--i-cant-afford-cga  Monokrom"
  flag_high_charts: "--high-charts        Høyere diagrammer (24 rader)"
  flag_no_charts: "--no-charts          Uten oversiktsgrafer"
  flag_no_table: "--no-table           Uten time-time-tabell"
  flag_tabular: "--tabular-bells      CSV i stedet for tabell/grafer"
  flag_no_eyecandy: "--no-eyecandy        Uten logo, topp- og bunntekst"
  default_palette: "(Standard: indigo → rød → oransje)"
  examples_title: "Eksempler:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Oslo"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Oslo 3-7              (dager 3–7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Oslo 3 --lang nb"
