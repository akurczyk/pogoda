usage:
  header: "Pogoda - Väder i terminalen  v%{version}"
  usage_title: "Användning:"
  usage_lat_lng: "pogoda <latitud> <longitud> [dagar]"
  usage_latlng: "pogoda <lat,lng> [dagar]"
  usage_city: "pogoda <stad> [dagar]"
  days_desc: "dagar  1–16 dagar (standard: 7); N–M visar endast N–M"
  modifiers_title: "Flaggor:"
  flag_drone: "--i-drone-you        Drönare: vind i höjder, regn, UV"
  flag_delorean: "--delorean D1 D2     Historik D1–D2 (DD.MM.YYYY); auto"
  flag_units: "--units <X>          Enheter: metric|imperial|british (auto)"
  flag_lang: "--lang <XX>          Språk: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (auto)"
  flag_blue: "--i-am-blue          Kall: cyan → blå → indigo"
  flag_color_me: "--color-me           Cyan → blå → indigo → röd → orange"
  flag_classic: "--classic-colors     Klassisk: blå → cyan → grön → gul"
  flag_rainforest: "--rainforest         Natur: cyan → grön → lime"
  flag_mono: "--i-cant-afford-cga  Monokrom"
  flag_high_charts: "--high-charts        Högre diagram (24 rader)"
  flag_no_charts: "--no-charts          Ingen översiktsgrafer"
  flag_no_table: "--no-table           Ingen timtabell"
  flag_tabular: "--tabular-bells      CSV i stället för tabell/grafer"
  flag_no_eyecandy: "--no-eyecandy        Utan logotyp, huvud och sidfot"
  default_palette: "(Standard: indigo → röd → orange)"
  examples_title: "Exempel:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Stockholm"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Stockholm 3-7         (dagar 3–7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Stockholm 3 --lang sv"
