usage:
  header: "Pogoda - Météo au terminal  v%{version}"
  usage_title: "Utilisation :"
  usage_lat_lng: "pogoda <latitude> <longitude> [jours]"
  usage_latlng: "pogoda <lat,lng> [jours]"
  usage_city: "pogoda <ville> [jours]"
  days_desc: "jours  Prévision sur 1–16 jours (défaut : 7) ; N–M n'affiche que les jours N à M"
  modifiers_title: "Options :"
  flag_drone: "--i-drone-you        Drone : vent par altitude, pluie, UV"
  flag_delorean: "--delorean D1 D2     Historique de D1 à D2 (JJ.MM.AAAA) ; choix auto du mode"
  flag_units: "--units <X>          Unités : metric|imperial|british (défaut : auto selon le système)"
  flag_lang: "--lang <XX>          Interface : en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (défaut : auto)"
  flag_blue: "--i-am-blue          Palette froide : cyan → bleu → indigo"
  flag_color_me: "--color-me           Palette : cyan → bleu → indigo → rouge → orange"
  flag_classic: "--classic-colors     Classique : bleu → cyan → vert → jaune → orange → rouge"
  flag_rainforest: "--rainforest         Nature : cyan → vert → citron"
  flag_mono: "--i-cant-afford-cga  Sortie sans couleurs"
  flag_high_charts: "--high-charts        Graphiques plus hauts (24 lignes)"
  flag_no_charts: "--no-charts          Masquer l'aperçu graphique"
  flag_no_table: "--no-table           Masquer le tableau horaire"
  flag_tabular: "--tabular-bells      Sortir des CSV plutôt que graphiques/tableau"
  flag_no_eyecandy: "--no-eyecandy        Sans logo, en-tête ni pied de page"
  default_palette: "(Palette par défaut : indigo → rouge → orange)"
  examples_title: "Exemples :"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Paris"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Lyon 3-7              (jours 3 à 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Paris 3 --lang fr-fr"
