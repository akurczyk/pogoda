usage:
  header: "Pogoda - Terminal Weather Forecast  v%{version}"
  usage_title: "Usage:"
  usage_lat_lng: "pogoda <latitude> <longitude> [days]"
  usage_latlng: "pogoda <lat,lng> [days]"
  usage_city: "pogoda <city> [days]"
  days_desc: "days  Forecast days 1–16 (default: 7); range N-M shows only days N through M"
  modifiers_title: "Modifiers:"
  flag_drone: "--i-drone-you        Drone pilot profile: multi-altitude wind, rain intensity, UV"
  flag_delorean: "--delorean D1 D2     Historical data from D1 to D2 (DD.MM.YYYY); auto-selects hourly/daily/monthly"
  flag_units: "--units <X>          Force unit system: metric|imperial|british (default: auto from OS locale)"
  flag_lang: "--lang <XX>          UI language: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (default: auto)"
  flag_blue: "--i-am-blue          Cool palette: cyan → blue → indigo"
  flag_color_me: "--color-me           Full palette: cyan → blue → indigo → red → orange"
  flag_classic: "--classic-colors     Classic palette: blue → cyan → green → yellow → orange → red"
  flag_rainforest: "--rainforest         Nature palette: cyan → green → lime"
  flag_mono: "--i-cant-afford-cga  Monochromatic output (no colors)"
  flag_high_charts: "--high-charts        Taller charts (24 rows)"
  flag_no_charts: "--no-charts          Skip the overview charts"
  flag_no_table: "--no-table           Skip the hourly table"
  flag_tabular: "--tabular-bells      Output CSV data instead of charts/table"
  flag_no_eyecandy: "--no-eyecandy        Skip logo, location header and footer"
  default_palette: "(Default palette: indigo → red → orange)"
  examples_title: "Examples:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Wrocław"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Wrocław 3-7              (days 3 through 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Wrocław 3 --lang pl"
