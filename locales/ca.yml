usage:
  header: "Pogoda - El temps al terminal  v%{version}"
  usage_title: "Ús:"
  usage_lat_lng: "pogoda <latitud> <longitud> [dies]"
  usage_latlng: "pogoda <lat,lng> [dies]"
  usage_city: "pogoda <ciutat> [dies]"
  days_desc: "dies  1–16 (per defecte: 7); N–M mostra només del dia N al M"
  modifiers_title: "Opcions:"
  flag_drone: "--i-drone-you        Dron: vent a altures, pluja, UV"
  flag_delorean: "--delorean D1 D2     Històric de D1 a D2 (DD.MM.YYYY); auto"
  flag_units: "--units <X>          Unitats: metric|imperial|british (per defecte: auto)"
  flag_lang: "--lang <XX>          Idioma: en|de|es-es|es-419|fr-fr|fr-ca|it|pt-br|pt-pt|nl|pl|cs|sk|hu|ro|hr|sv|da|nb|fi|tr|el|ru|uk|ca (per defecte: auto)"
  flag_blue: "--i-am-blue          Fred: cian → blau → indi"
  flag_color_me: "--color-me           cian → blau → indi → vermell → taronja"
  flag_classic: "--classic-colors     clàssic: blau → cian → verd → groc"
  flag_rainforest: "--rainforest         natura: cian → verd → llima"
  flag_mono: "--i-cant-afford-cga  Sense colors"
  flag_high_charts: "--high-charts        Gràfics més alts (24 línies)"
  flag_no_charts: "--no-charts          Sense gràfics resum"
  flag_no_table: "--no-table           Sense taula horària"
  flag_tabular: "--tabular-bells      Sortida CSV"
  flag_no_eyecandy: "--no-eyecandy        Sense logo ni capçaleres"
  default_palette: "(Per defecte: indi → vermell → taronja)"
  examples_title: "Exemples:"
  ex1: "pogoda 52.52 13.41"
  ex2: "pogoda 51.10,17.00 14"
  ex3: "pogoda Barcelona"
  ex4: "pogoda Berlin 10 --units imperial"
  ex5: "pogoda London 7 --units british"
  ex6: "pogoda New York 7 --i-am-blue"
  ex7: "pogoda Barcelona 3-7         (dies 3 a 7)"
  ex8: "pogoda Berlin 5-10 --i-drone-you"
  ex9: "pogoda Barcelona 3 --lang ca"
